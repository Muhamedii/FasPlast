name: Deploy to GitHub Pages

# Pages deployments are only accepted from the repository default branch
# (claude/fasplast-github-pages-6feg03). A trigger on main always fails
# and its run cancels the good one via the concurrency group.
on:
  push:
    branches:
      - claude/fasplast-github-pages-6feg03
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
